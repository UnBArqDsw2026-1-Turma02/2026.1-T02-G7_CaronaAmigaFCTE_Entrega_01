name: Pull Request
description: Submeter uma Pull Request ao projeto Carona Amiga FCTE
title: "[PR] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        ## 🚀 Obrigado por contribuir!
        
        Este template segue as melhores práticas de PR descritas em: [Write a good pull request - Google Blockly Guide](https://developers.google.com/blockly/guides/contribute/get-started/write_a_good_pr)

  - type: textarea
    id: descricao
    attributes:
      label: 📝 Descrição
      description: Descreva brevemente o que essa PR faz. Explique o propósito da mudança, problema resolvido ou funcionalidade adicionada
      placeholder: |
        Essa PR implementa...
        O problema que resolve é...
        A mudança implementa...
    validations:
      required: true

  - type: textarea
    id: tarefa-relacionada
    attributes:
      label: 📌 Tarefa Relacionada
      description: Vincule a issue ou tarefa correspondente
      placeholder: |
        Closes #123
           ou
        Related to #456
    validations:
      required: false

  - type: checkboxes
    id: escopo-pr
    attributes:
      label: 📊 Escopo da PR
      description: Mantenha a PR pequena e focada
      options:
        - label: Confirmo que essa PR resolve apenas um problema/funcionalidade
          required: true
        - label: Confirmo que é uma mudança modular suficiente e não precisa ser repartida em mais PRs
          required: true

  - type: textarea
    id: alteracoes-realizadas
    attributes:
      label: 🔍 Alterações Realizadas
      description: Liste as principais mudanças feitas neste PR. Use commits lógicos se tiver múltiplas alterações.
      placeholder: |
        - Criação do componente Header
        - Refatoração da função de login
        - Adição de validação no formulário de cadastro
    validations:
      required: true

  - type: textarea
    id: como-testar
    attributes:
      label: 🧪 Como Testar
      description: Descreva os passos para testar as alterações de forma clara e concisa
      placeholder: |
        1. Rodar `npm install`
        2. Executar `npm run dev`
        3. Acessar `/login` e testar o novo fluxo de autenticação
        4. Executar testes: `npm test`
    validations:
      required: true

  - type: checkboxes
    id: checklist-qualidade
    attributes:
      label: ✅ Checklist de Qualidade
      description: Marque os itens que você completou
      options:
        - label: Código testado localmente
          required: true
        - label: Alterações seguem o padrão de codificação do projeto
          required: true
        - label: Nenhuma funcionalidade existente foi quebrada
          required: true
        - label: Testes foram adicionados (se aplicável)
        - label: Documentação foi atualizada (se necessário)
        - label: Commits têm mensagens claras e descritivas
          required: true
        - label: Sem conflitos com a branch principal

  - type: dropdown
    id: breaking-changes
    attributes:
      label: 🚨 Breaking Changes
      description: Há mudanças que quebram funcionalidades existentes?
      options:
        - Nenhuma mudança de ruptura
        - Existem mudanças de ruptura
    validations:
      required: true

  - type: textarea
    id: breaking-changes-descricao
    attributes:
      label: 🚨 Descreva Breaking Changes
      description: Se selecionou que há breaking changes, descreva-as aqui em detalhes
      placeholder: "As mudanças afetam..."
    validations:
      required: false

  - type: textarea
    id: informacoes-adicionais
    attributes:
      label: 📚 Informações Adicionais
      description: Qualquer outra informação útil - considerações de performance, dívida técnica, pontos para discussão, etc.
      placeholder: |
        Pontos importantes para review:
        - ...
        - ...
    validations:
      required: false

  - type: checkboxes
    id: termos
    attributes:
      label: 🤝 Código de Conduta
      description: Ao enviar esta PR, você concorda em seguir nosso [Código de Conduta](../blob/main/CODE_OF_CONDUCT.md)
      options:
        - label: Concordo em seguir o Código de Conduta do projeto
          required: true


