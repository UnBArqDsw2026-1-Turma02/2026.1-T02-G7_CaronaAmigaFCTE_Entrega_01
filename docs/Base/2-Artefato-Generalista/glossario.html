<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glossário Carona Amiga FCTE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
 
        :root {
            --primary-blue: #0056b3;
            --secondary-green: #28a745;
            --light-blue: #e3f2fd;
            --light-green: #e8f5e9;
            --bg-light: #f4f7f6;
            --text-dark: #333;
            --text-light: #666;
            --white: #ffffff;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
            --shadow-lg: 0 8px 25px rgba(0,0,0,0.15);
        }
 
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--light-blue) 0%, var(--light-green) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }
 
        .glossary-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
 
        .header {
            text-align: center;
            margin-bottom: 20px;
            animation: fadeInDown 0.6s ease-out;
        }
 
        .header h1 {
            color: var(--primary-blue);
            font-size: clamp(24px, 5vw, 40px);
            margin-bottom: 5px;
            font-weight: 800;
        }
 
        .header p {
            color: var(--secondary-green);
            font-weight: 600;
            font-size: clamp(14px, 2vw, 18px);
        }

        /* BARRA DE BUSCA */
        .search-container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto 20px;
            padding: 0 20px;
        }

        .search-input {
            width: 100%;
            padding: 12px 25px;
            border-radius: 30px;
            border: 2px solid var(--white);
            box-shadow: var(--shadow);
            outline: none;
            font-size: 16px;
            transition: all 0.3s ease;
            text-align: center;
        }

        .search-input:focus {
            border-color: var(--primary-blue);
            box-shadow: var(--shadow-lg);
        }
 
        /* Slider com Scroll Nativo */
        .slider-section {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
 
        .slider-wrapper {
            width: 100%;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            padding: 40px 0;
            display: flex;
            scrollbar-width: none;
        }
 
        .slider-wrapper::-webkit-scrollbar { display: none; }
 
        .cards-container {
            display: flex;
            padding: 0 calc(50% - 160px);
        }
 
        .card {
            min-width: 320px;
            width: 320px;
            height: 380px;
            background: var(--white);
            border-radius: 20px;
            margin: 0 15px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            padding: 30px;
            scroll-snap-align: center;
            transition: transform 0.3s, box-shadow 0.3s, opacity 0.3s;
            border-top: 6px solid var(--primary-blue);
            cursor: pointer;
            position: relative;
        }
 
        .card.active {
            transform: scale(1.05);
            box-shadow: var(--shadow-lg);
            opacity: 1;
        }
 
        .card:not(.active) {
            opacity: 0.6;
            transform: scale(0.9);
        }
 
        .card-number {
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--secondary-green) 100%);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 20px;
        }
 
        .card-title {
            font-size: 26px;
            color: var(--primary-blue);
            margin-bottom: 12px;
            font-weight: 800;
        }
 
        .card-description {
            font-size: 15px;
            color: var(--text-light);
            line-height: 1.6;
            flex-grow: 1;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
        }
 
        .card-footer {
            margin-top: 15px;
            font-size: 12px;
            color: var(--secondary-green);
            font-weight: 700;
            text-align: right;
        }
 
        /* Navigation Dots */
        .navigation {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
 
        .dots {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 80%;
        }
 
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(0, 86, 179, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
        }
 
        .dot.active {
            background: var(--primary-blue);
            width: 25px;
            border-radius: 10px;
        }
 
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
            padding: 20px;
        }
 
        .modal-overlay.active { display: flex; }
 
        .modal-content {
            background: var(--white);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 25px;
            position: relative;
            border-left: 8px solid var(--secondary-green);
            animation: modalPop 0.3s ease-out;
        }
 
        @keyframes modalPop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
 
        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 30px;
            background: none; border: none; cursor: pointer; color: #ccc;
        }
 
        @media (max-width: 480px) {
            .cards-container { padding: 0 calc(50% - 140px); }
            .card { min-width: 280px; width: 280px; }
        }
    </style>
</head>
<body>
 
<div class="glossary-wrapper">
    <div class="header">
        <h1>Carona Amiga FCTE</h1>
        <p>Glossário de Termos</p>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="Buscar termo no glossário...">
    </div>
 
    <div class="slider-section">
        <div class="slider-wrapper" id="sliderWrapper">
            <div class="cards-container" id="cardsContainer"></div>
        </div>
 
        <div class="navigation">
            <div class="dots" id="dotsContainer"></div>
            <div class="swipe-hint">
                <span style="color: var(--primary-blue); font-weight: 500;">Role para o lado para explorar</span>
            </div>
        </div>
    </div>
</div>
 
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
        <button class="close-btn" id="closeBtn">&times;</button>
        <h2 id="modalTitle" style="color: var(--primary-blue); margin-bottom: 15px;"></h2>
        <p id="modalBody" style="line-height: 1.6; color: var(--text-dark);"></p>
    </div>
</div>
 
<script>
    const rawTerms = [
        { title: "Framework 5W2H", desc: "Uma estrutura real ou conceitual ordenada que atua como um guia para o projeto e avaliação da gamificação centrada no usuário." },
        { title: "Pré-rastreabilidade (Pre-traceability)", desc: "No processo de Engenharia de Requisitos (RE), refere-se à ação de rastrear as origens das interações e grupos envolvidos na definição dos requisitos." },
        { title: "Mapas Mentais", desc: "Diagramas e ferramentas gráficas não lineares que organizam e representam relações entre ideias a partir de um tema central." },
        { title: "Léxicos", desc: "Descrição do vocabulário de uma aplicação, baseando-se na ideia de que cada Universo de Discurso (UofD) possui uma linguagem específica." },
        { title: "Design Sprint", desc: "Processo prático e ágil de cinco dias para resolver problemas críticos por meio do design, prototipagem e teste com usuários." },
        { title: "Modelagem BPMN", desc: "Business Process Model and Notation. Padrão global utilizado para mapear e modelar processos de negócios visualmente." },
        { title: "Brainstorming", desc: "Livre fluxo de ideias fundamentado no pensamento criativo que estimula a liberdade de raciocínio e a criatividade." },
        { title: "Storyboarding", desc: "Técnica visual de organizar ilustrações em sequência para planejar a narrativa ou o fluxo de interação de um sistema." },
        { title: "Commit", desc: "Operação que salva e registra um conjunto de alterações feitas no código-fonte em um repositório de controle de versão." },
        { title: "Issue", desc: "Unidade de trabalho rastreável que representa um bug, funcionalidade ou tarefa pendente em uma gestão de projetos." },
        { title: "Pull Request", desc: "Solicitação para que alterações de código em uma branch paralela sejam revisadas e integradas ao código principal." },
        { title: "Branch", desc: "Linha de desenvolvimento independente e paralela ao código principal de um projeto." },
        { title: "Artefato", desc: "Produto físico ou digital gerado ao longo de um processo ou projeto, utilizado como entrega ou resultado final." },
        { title: "Custo de software", desc: "Processo de prever esforço, tempo e recursos necessários para desenvolver um sistema de software." },
        { title: "Carona", desc: "Ato de oferecer ou solicitar transporte gratuito em um veículo, dividindo custos ou oferecendo assentos vagos." },
        { title: "FCTE", desc: "Faculdade de Ciências e Tecnologias em Engenharia da Universidade de Brasília (UnB), localizada no campus Gama." },
        { title: "Features", desc: "Funcionalidades ou características específicas implementadas em um software para atender necessidades do usuário." },
        { title: "Docsify", desc: "Gerador de sites de documentação que transforma arquivos Markdown (.md) diretamente em um site dinâmico." },
        { title: "Unpack", desc: "Fase de alinhamento e mapeamento do problema, compartilhando o conhecimento da equipe." },
        { title: "Sketch", desc: "Fase de ideação e geração de soluções através de desenhos individuais e focados no Design Sprint." },
        { title: "Decision", desc: "Etapa de análise crítica das opções para escolher qual ideia tem a maior chance de resolver o problema inicial." },
        { title: "Prototype", desc: "Construção de uma fachada realista da solução escolhida para ser testada sem necessidade de código funcional." },
        { title: "Test", desc: "Momento de validação do protótipo com usuários reais para revelar padrões de usabilidade." }
    ];

    // Ordenar Alfabeticamente
    const terms = rawTerms.sort((a, b) => a.title.localeCompare(b.title));
 
    const wrapper = document.getElementById('sliderWrapper');
    const container = document.getElementById('cardsContainer');
    const dotsContainer = document.getElementById('dotsContainer');
    const modal = document.getElementById('modalOverlay');
    const searchInput = document.getElementById('searchInput');
 
    function render(filter = "") {
        container.innerHTML = "";
        dotsContainer.innerHTML = "";
        
        const filtered = terms.filter(t => 
            t.title.toLowerCase().includes(filter.toLowerCase()) || 
            t.desc.toLowerCase().includes(filter.toLowerCase())
        );

        if(filtered.length === 0) {
            container.innerHTML = `<p style="color: var(--primary-blue); font-weight: bold; margin-top: 50px;">Nenhum termo encontrado.</p>`;
            return;
        }

        filtered.forEach((term, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-number">${index + 1}</div>
                <h2 class="card-title">${term.title}</h2>
                <p class="card-description">${term.desc}</p>
                <div class="card-footer">Saiba mais →</div>
            `;
            card.onclick = () => {
                document.getElementById('modalTitle').innerText = term.title;
                document.getElementById('modalBody').innerText = term.desc;
                modal.classList.add('active');
            };
            container.appendChild(card);
 
            const dot = document.createElement('div');
            dot.className = `dot ${index === 0 ? 'active' : ''}`;
            dot.onclick = () => {
                const scrollPos = index * (card.offsetWidth + 30);
                wrapper.scrollTo({ left: scrollPos, behavior: 'smooth' });
            };
            dotsContainer.appendChild(dot);
        });
        updateActiveState();
    }
 
    function updateActiveState() {
        const cards = container.querySelectorAll('.card');
        const dots = dotsContainer.querySelectorAll('.dot');
        if(cards.length === 0) return;

        const cardWidth = cards[0].offsetWidth + 30;
        const index = Math.round(wrapper.scrollLeft / cardWidth);
 
        cards.forEach((c, i) => c.classList.toggle('active', i === index));
        dots.forEach((d, i) => d.classList.toggle('active', i === index));
    }

    searchInput.addEventListener('input', (e) => {
        render(e.target.value);
        wrapper.scrollLeft = 0;
    });
 
    wrapper.addEventListener('scroll', updateActiveState);
    document.getElementById('closeBtn').onclick = () => modal.classList.remove('active');
    window.onclick = (e) => { if(e.target === modal) modal.classList.remove('active'); };
 
    render();
</script>
</body>
</html>
