<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glossário Carona Amiga FCTE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
 
        :root {
            --primary-blue: #0056b3;
            --secondary-green: #28a745;
            --light-blue: #e3f2fd;
            --light-green: #e8f5e9;
            --bg-light: #f4f7f6;
            --text-dark: #333;
            --text-light: #666;
            --white: #ffffff;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
            --shadow-lg: 0 8px 25px rgba(0,0,0,0.15);
        }
 
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--light-blue) 0%, var(--light-green) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }
 
        .glossary-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
 
        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 0.6s ease-out;
        }
 
        .header h1 {
            color: var(--primary-blue);
            font-size: clamp(24px, 5vw, 40px);
            margin-bottom: 5px;
            font-weight: 800;
        }
 
        .header p {
            color: var(--secondary-green);
            font-weight: 600;
            font-size: clamp(14px, 2vw, 18px);
        }
 
        /* Slider com Scroll Nativo */
        .slider-section {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
 
        .slider-wrapper {
            width: 100%;
            overflow-x: auto;
            scroll-snap-type: x mandatory; /* Efeito de imã */
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            padding: 40px 0;
            display: flex;
            scrollbar-width: none; /* Firefox */
        }
 
        .slider-wrapper::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }
 
        .cards-container {
            display: flex;
            padding: 0 calc(50% - 160px); /* Centraliza o primeiro e último card */
        }
 
        .card {
            min-width: 320px;
            width: 320px;
            height: 380px;
            background: var(--white);
            border-radius: 20px;
            margin: 0 15px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            padding: 30px;
            scroll-snap-align: center; /* Alinha no centro ao soltar */
            transition: transform 0.3s, box-shadow 0.3s, opacity 0.3s;
            border-top: 6px solid var(--primary-blue);
            cursor: pointer;
            position: relative;
        }
 
        /* Efeito visual para o card em foco (via JS) */
        .card.active {
            transform: scale(1.05);
            box-shadow: var(--shadow-lg);
            opacity: 1;
        }
 
        .card:not(.active) {
            opacity: 0.6;
            transform: scale(0.9);
        }
 
        .card-number {
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--secondary-green) 100%);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 20px;
        }
 
        .card-title {
            font-size: 26px;
            color: var(--primary-blue);
            margin-bottom: 12px;
            font-weight: 800;
        }
 
        .card-description {
            font-size: 15px;
            color: var(--text-light);
            line-height: 1.6;
            flex-grow: 1;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
        }
 
        .card-footer {
            margin-top: 15px;
            font-size: 12px;
            color: var(--secondary-green);
            font-weight: 700;
            text-align: right;
        }
 
        /* Navigation Dots */
        .navigation {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
 
        .dots {
            display: flex;
            gap: 8px;
        }
 
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(0, 86, 179, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
        }
 
        .dot.active {
            background: var(--primary-blue);
            width: 25px;
            border-radius: 10px;
        }
 
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
            padding: 20px;
        }
 
        .modal-overlay.active { display: flex; }
 
        .modal-content {
            background: var(--white);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 25px;
            position: relative;
            border-left: 8px solid var(--secondary-green);
            animation: modalPop 0.3s ease-out;
        }
 
        @keyframes modalPop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
 
        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 30px;
            background: none; border: none; cursor: pointer; color: #ccc;
        }
 
        @media (max-width: 480px) {
            .cards-container { padding: 0 calc(50% - 140px); }
            .card { min-width: 280px; width: 280px; }
        }
    </style>
</head>
<body>
 
<div class="glossary-wrapper">
    <div class="header">
        <h1>Carona Amiga FCTE</h1>
        <p>Glossário de Termos</p>
    </div>
 
    <div class="slider-section">
        <div class="slider-wrapper" id="sliderWrapper">
            <div class="cards-container" id="cardsContainer">
                </div>
        </div>
 
        <div class="navigation">
            <div class="dots" id="dotsContainer"></div>
            <div class="swipe-hint">
                <span style="color: var(--primary-blue); font-weight: 500;">Rola para o lado para explorar</span>
            </div>
        </div>
    </div>
</div>
 
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
        <button class="close-btn" id="closeBtn">&times;</button>
        <h2 id="modalTitle" style="color: var(--primary-blue); margin-bottom: 15px;"></h2>
        <p id="modalBody" style="line-height: 1.6; color: var(--text-dark);"></p>
    </div>
</div>
 
<script>
    const terms = [
        { id: 1, title: "Carpooling", desc: "Prática de compartilhar viagens de carro com outras pessoas que têm destinos semelhantes. É uma forma sustentável e econômica de se deslocar, reduzindo custos com combustível e contribuindo para a redução de emissões de carbono no campus." },
        { id: 2, title: "Ponto de Encontro", desc: "Local pré-definido no campus ou cidade para o embarque e desembarque seguro dos passageiros. Esses pontos são estrategicamente escolhidos para facilitar o acesso e garantir a segurança de todos os usuários do aplicativo." },
        { id: 3, title: "Match de Rota", desc: "Algoritmo inteligente que conecta motoristas e passageiros com trajetos e horários compatíveis. O sistema analisa as rotas e disponibilidades para oferecer as melhores combinações de caronas possíveis." },
        { id: 4, title: "Vaga Solidária", desc: "Assento disponível oferecido pelo motorista sem fins lucrativos, apenas para divisão de custos. A vaga solidária promove a comunidade e a ajuda mútua entre os membros da faculdade." },
        { id: 5, title: "Comunidade FCTE", desc: "Grupo restrito de usuários verificados pertencentes à faculdade, garantindo maior segurança. Todos os membros têm seus documentos validados e vínculo acadêmico confirmado para usar o aplicativo." },
        { id: 6, title: "Check-in", desc: "Confirmação de que o passageiro entrou no veículo, ativando o monitoramento da viagem. O check-in é fundamental para rastrear a localização em tempo real e garantir a segurança de todos." },
        { id: 7, title: "Rateio", desc: "Divisão proporcional dos custos de combustível e pedágio entre os ocupantes do veículo. O rateio é calculado automaticamente pelo aplicativo de forma justa e transparente para todos." },
        { id: 8, title: "Perfil Verificado", desc: "Status de segurança atribuído a usuários que validaram seus documentos e vínculo acadêmico. Um perfil verificado aumenta a confiança entre motoristas e passageiros na plataforma." }
    ];
 
    const wrapper = document.getElementById('sliderWrapper');
    const container = document.getElementById('cardsContainer');
    const dotsContainer = document.getElementById('dotsContainer');
    const modal = document.getElementById('modalOverlay');
 
    // Inicialização
    function init() {
        terms.forEach((term, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-number">${term.id}</div>
                <h2 class="card-title">${term.title}</h2>
                <p class="card-description">${term.desc}</p>
                <div class="card-footer">Saiba mais →</div>
            `;
            card.onclick = () => {
                document.getElementById('modalTitle').innerText = term.title;
                document.getElementById('modalBody').innerText = term.desc;
                modal.classList.add('active');
            };
            container.appendChild(card);
 
            const dot = document.createElement('div');
            dot.className = `dot ${index === 0 ? 'active' : ''}`;
            dot.onclick = () => {
                const scrollPos = index * (card.offsetWidth + 30);
                wrapper.scrollTo({ left: scrollPos, behavior: 'smooth' });
            };
            dotsContainer.appendChild(dot);
        });
        updateActiveState();
    }
 
    // Atualiza estados visuais durante o scroll
    function updateActiveState() {
        const cardWidth = container.querySelector('.card').offsetWidth + 30;
        const index = Math.round(wrapper.scrollLeft / cardWidth);
 
        document.querySelectorAll('.card').forEach((c, i) => {
            c.classList.toggle('active', i === index);
        });
 
        document.querySelectorAll('.dot').forEach((d, i) => {
            d.classList.toggle('active', i === index);
        });
    }
 
    wrapper.addEventListener('scroll', updateActiveState);
 
    document.getElementById('closeBtn').onclick = () => modal.classList.remove('active');
    window.onclick = (e) => { if(e.target === modal) modal.classList.remove('active'); };
 
    init();
</script>
</body>
</html>
