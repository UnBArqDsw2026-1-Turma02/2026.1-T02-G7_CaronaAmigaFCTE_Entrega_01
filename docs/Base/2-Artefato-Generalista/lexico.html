<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexico Carona Amiga FCTE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-blue: #0056b3;
            --secondary-green: #28a745;
            --light-blue: #e3f2fd;
            --light-green: #e8f5e9;
            --text-dark: #333;
            --text-light: #666;
            --white: #ffffff;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--light-blue) 0%, var(--light-green) 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            gap: 18px;
        }

        .header {
            text-align: center;
        }

        .header h1 {
            color: var(--primary-blue);
            font-size: clamp(24px, 4.8vw, 38px);
            font-weight: 800;
        }

        .header p {
            color: var(--secondary-green);
            font-weight: 600;
            margin-top: 4px;
            font-size: clamp(13px, 2vw, 18px);
        }

        .search-container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto 20px;
            padding: 0 20px;
        }

        .search-input {
            width: 100%;
            padding: 12px 25px;
            border-radius: 30px;
            border: 2px solid var(--white);
            box-shadow: var(--shadow);
            outline: none;
            font-size: 16px;
            transition: all 0.3s ease;
            text-align: center;
        }

        .search-input:focus {
            border-color: var(--primary-blue);
            box-shadow: var(--shadow-lg);
        }

        .slider-section {
            width: 100%;
            max-width: 1240px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .slider-wrapper {
            width: 100%;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            padding: 26px 0;
            scrollbar-width: none;
        }

        .slider-wrapper::-webkit-scrollbar {
            display: none;
        }

        .cards-container {
            display: flex;
        }

        .cards-container::before,
        .cards-container::after {
            content: '';
            flex: 0 0 calc(50% - 184px);
        }

        .card {
            min-width: 340px;
            width: 340px;
            height: 400px;
            margin: 0 14px;
            padding: 24px;
            border-radius: 20px;
            background: var(--white);
            border-top: 6px solid var(--primary-blue);
            box-shadow: var(--shadow);
            scroll-snap-align: center;
            transition: transform 0.28s ease, opacity 0.28s ease, box-shadow 0.28s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card.active {
            transform: scale(1.04);
            opacity: 1;
            box-shadow: var(--shadow-lg);
        }

        .card:not(.active) {
            transform: scale(0.92);
            opacity: 0.62;
        }

        .card-number {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--secondary-green) 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .card-title {
            color: var(--primary-blue);
            font-size: 24px;
            line-height: 1.15;
            font-weight: 800;
        }

        .card-type {
            align-self: flex-start;
            background: var(--light-green);
            color: var(--secondary-green);
            border: 1px solid rgba(40, 167, 69, 0.3);
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            padding: 6px 10px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .card-description {
            color: var(--text-light);
            font-size: 15px;
            line-height: 1.6;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 5;
            -webkit-box-orient: vertical;
        }

        .card-footer {
            margin-top: auto;
            color: var(--secondary-green);
            font-weight: 700;
            font-size: 12px;
            text-align: right;
        }

        .navigation {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .dots {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 80%;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(0, 86, 179, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            padding: 0;
            appearance: none;
            -webkit-appearance: none;
        }

        .dot:focus,
        .dot:focus-visible {
            outline: none;
            box-shadow: none;
        }

        .dot.active {
            background: var(--primary-blue);
            width: 25px;
            border-radius: 10px;
        }

        .empty {
            width: 100%;
            text-align: center;
            color: var(--primary-blue);
            font-weight: 700;
            padding: 20px;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.65);
            z-index: 1000;
            backdrop-filter: blur(4px);
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            width: 100%;
            max-width: 680px;
            max-height: 90vh;
            overflow: auto;
            background: #fff;
            border-radius: 22px;
            border-left: 8px solid var(--secondary-green);
            padding: 30px;
            position: relative;
            animation: popup 0.2s ease-out;
        }

        @keyframes popup {
            from {
                transform: scale(0.92);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 16px;
            border: none;
            background: transparent;
            font-size: 30px;
            color: #aaa;
            cursor: pointer;
        }

        .modal-title {
            color: var(--primary-blue);
            margin-bottom: 8px;
            font-size: clamp(24px, 3.8vw, 32px);
            font-weight: 800;
        }

        .modal-type {
            display: inline-block;
            margin-bottom: 16px;
            background: var(--light-green);
            color: var(--secondary-green);
            border-radius: 999px;
            padding: 6px 11px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .modal-section {
            margin-top: 10px;
        }

        .modal-section h3 {
            color: var(--primary-blue);
            font-size: 17px;
            margin-bottom: 8px;
        }

        .modal-list {
            margin-left: 18px;
            color: var(--text-dark);
            line-height: 1.55;
        }

        .modal-list li + li {
            margin-top: 6px;
        }

        @media (max-width: 520px) {
            .cards-container::before,
            .cards-container::after {
                flex-basis: calc(50% - 159px);
            }

            .card {
                min-width: 290px;
                width: 290px;
                height: 390px;
            }
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="header">
        <h1>Carona Amiga FCTE</h1>
        <p>Léxico Interativo (LAL)</p>
    </div>

    <div class="search-container">
        <input id="searchInput" class="search-input" type="text" placeholder="Buscar termo, tipo, noção ou impacto...">
    </div>

    <section class="slider-section">
        <div class="slider-wrapper" id="sliderWrapper">
            <div class="cards-container" id="cardsContainer"></div>
        </div>

        <div class="navigation">
            <div class="dots" id="dotsContainer"></div>
            <div class="swipe-hint">
                <span style="color: var(--primary-blue); font-weight: 500;">Role para o lado para explorar</span>
            </div>
        </div>
    </section>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
        <button class="close-btn" id="closeBtn">&times;</button>
        <h2 class="modal-title" id="modalTitle"></h2>
        <span class="modal-type" id="modalType"></span>

        <section class="modal-section">
            <h3>Noção</h3>
            <ul class="modal-list" id="modalNocao"></ul>
        </section>

        <section class="modal-section">
            <h3>Impacto</h3>
            <ul class="modal-list" id="modalImpacto"></ul>
        </section>
    </div>
</div>

<script>
    const rawTerms = [
        {
            title: "Motorista",
            type: "Objeto",
            nocao: [
                "Estudante da FCTE que oferece caronas na plataforma.",
                "Responsavel por informar rota, horario, numero de vagas no carro e combinar o valor da corrida."
            ],
            impacto: [
                "Realiza as tarefas de criar carona, fechar carona, editar carona, aceitar solicitacao e concluir carona.",
                "Tambem pode editar perfil no aplicativo."
            ]
        },
        {
            title: "Passageiro",
            type: "Objeto",
            nocao: [
                "Estudante da FCTE que busca caronas disponiveis para seu trajeto.",
                "Envia solicitacao ao motorista com base em origem, destino, horario e disponibilidade."
            ],
            impacto: [
                "Realiza as tarefas de solicitar carona, editar perfil, cancelar carona e avaliar motorista."
            ]
        },
        {
            title: "Carona",
            type: "Objeto",
            nocao: [
                "Deslocamento compartilhado entre motorista e um ou mais passageiros.",
                "Possui origem, destino, horario, vagas e status associados."
            ],
            impacto: [
                "Pode ser consultada, solicitada e cancelada pelo passageiro.",
                "Pode ser criada, modificada, finalizada ou fechada pelo motorista."
            ]
        },
        {
            title: "Criar carona",
            type: "Verbo",
            nocao: [
                "Tarefa realizada pelo motorista.",
                "Acontece quando o motorista se disponibiliza a dar uma carona e informar os detalhes da viagem."
            ],
            impacto: [
                "A carona fica disponivel para consulta.",
                "As vagas ficam disponiveis para solicitacoes."
            ]
        },
        {
            title: "Concluir carona",
            type: "Verbo",
            nocao: [
                "Tarefa realizada pelo motorista ao fim do trajeto.",
                "Ocorre quando os passageiros chegam ao destino e a viagem e encerrada."
            ],
            impacto: [
                "A carona deixa de aceitar interacoes.",
                "O sistema registra a conclusao da viagem.",
                "Passageiros podem avaliar motorista."
            ]
        },
        {
            title: "Editar carona",
            type: "Verbo",
            nocao: [
                "Tarefa realizada pelo motorista para alterar rota, horario ou vagas.",
                "Ocorre quando existem ajustes necessarios antes do inicio da viagem."
            ],
            impacto: [
                "Informacoes da carona sao atualizadas no sistema.",
                "Passageiros associados podem ser notificados sobre alteracoes."
            ]
        },
        {
            title: "Solicitar carona",
            type: "Verbo",
            nocao: [
                "Tarefa realizada pelo passageiro ao se candidatar a uma vaga.",
                "Ocorre quando o passageiro encontra uma carona compativel."
            ],
            impacto: [
                "Uma solicitacao de participacao e registrada.",
                "O motorista pode aceitar ou recusar a solicitacao."
            ]
        },
        {
            title: "Editar perfil",
            type: "Verbo",
            nocao: [
                "Tarefa realizada por passageiro e motorista.",
                "Ocorre quando e necessario atualizar dados pessoais e preferencias de uso."
            ],
            impacto: [
                "Informacoes cadastrais sao atualizadas no sistema.",
                "Dados podem influenciar combinacao de carona e contato entre usuarios."
            ]
        },
        {
            title: "Cancelar carona",
            type: "Verbo",
            nocao: [
                "Tarefa realizada pelo passageiro ao desistir de participar de uma carona.",
                "Ocorre antes do inicio da viagem ou por impossibilidade de comparecimento."
            ],
            impacto: [
                "A solicitacao ou participacao e cancelada.",
                "A vaga volta a ficar disponivel para outros passageiros.",
                "O motorista e notificado."
            ]
        },
        {
            title: "Avaliar motorista",
            type: "Verbo",
            nocao: [
                "Tarefa realizada pelo passageiro ao final da viagem.",
                "Ocorre apos a carona concluida, com nota e comentario sobre a experiencia."
            ],
            impacto: [
                "A avaliacao e registrada no sistema.",
                "O historico de reputacao do motorista e atualizado.",
                "Futuros passageiros passam a ter mais informacoes para decidir."
            ]
        },
        {
            title: "Aceitar solicitacao de carona",
            type: "Verbo",
            nocao: [
                "Tarefa realizada pelo motorista ao analisar uma solicitacao enviada por passageiro.",
                "Ocorre quando ha vagas e compatibilidade com a viagem."
            ],
            impacto: [
                "Passageiro passa a ocupar vaga na carona.",
                "Numero de vagas disponiveis e atualizado.",
                "Passageiro e notificado da decisao."
            ]
        },
        {
            title: "Fechar carona",
            type: "Verbo",
            nocao: [
                "Tarefa realizada pelo motorista ou pelo sistema de forma automatica.",
                "Ocorre quando nao se deseja mais aceitar novas solicitacoes ou quando as vagas foram preenchidas."
            ],
            impacto: [
                "A carona deixa de aceitar novas solicitacoes.",
                "Sistema impede novas reservas de vagas."
            ]
        },
        {
            title: "Carona aberta",
            type: "Estado",
            nocao: [
                "Estado da carona em que ainda existem vagas disponiveis.",
                "Permite que passageiros visualizem e solicitem participacao."
            ],
            impacto: [
                "Passageiros podem enviar solicitacoes.",
                "Motorista pode editar ou fechar carona.",
                "Sistema mantem controle das vagas disponiveis."
            ]
        },
        {
            title: "Carona fechada",
            type: "Estado",
            nocao: [
                "Estado da carona em que nao sao aceitas novas solicitacoes.",
                "Pode ocorrer por decisao do motorista ou por preenchimento total das vagas."
            ],
            impacto: [
                "Passageiros nao podem mais solicitar participacao.",
                "Sistema bloqueia novas reservas de vagas."
            ]
        },
        {
            title: "Carona em andamento",
            type: "Estado",
            nocao: [
                "Estado da carona em que o trajeto ja foi iniciado.",
                "Motorista e passageiros estao em viagem."
            ],
            impacto: [
                "Nao e possivel adicionar ou remover passageiros.",
                "Motorista nao pode mais editar carona.",
                "Sistema registra o progresso da viagem."
            ]
        },
        {
            title: "Carona concluida",
            type: "Estado",
            nocao: [
                "Estado da carona apos a finalizacao do trajeto e chegada ao destino.",
                "A viagem foi encerrada e registrada no historico."
            ],
            impacto: [
                "Nenhuma acao operacional pode ser realizada na carona.",
                "Participantes podem visualizar os dados da viagem.",
                "Passageiro pode avaliar motorista."
            ]
        }
    ];

    const terms = rawTerms.sort((a, b) => a.title.localeCompare(b.title, 'pt-BR'));

    const sliderWrapper = document.getElementById('sliderWrapper');
    const cardsContainer = document.getElementById('cardsContainer');
    const dotsContainer = document.getElementById('dotsContainer');
    const searchInput = document.getElementById('searchInput');

    const modalOverlay = document.getElementById('modalOverlay');
    const modalTitle = document.getElementById('modalTitle');
    const modalType = document.getElementById('modalType');
    const modalNocao = document.getElementById('modalNocao');
    const modalImpacto = document.getElementById('modalImpacto');
    const closeBtn = document.getElementById('closeBtn');

    function includesFilter(term, filter) {
        const text = [
            term.title,
            term.type,
            ...term.nocao,
            ...term.impacto
        ].join(' ').toLowerCase();

        return text.includes(filter.toLowerCase());
    }

    function setModalList(target, items) {
        target.innerHTML = '';
        items.forEach((item) => {
            const li = document.createElement('li');
            li.textContent = item;
            target.appendChild(li);
        });
    }

    function openModal(term) {
        modalTitle.textContent = term.title;
        modalType.textContent = term.type;
        setModalList(modalNocao, term.nocao);
        setModalList(modalImpacto, term.impacto);
        modalOverlay.classList.add('active');
    }

    function closeModal() {
        modalOverlay.classList.remove('active');
    }

    function updateActiveState() {
        const cards = cardsContainer.querySelectorAll('.card');
        const dots = dotsContainer.querySelectorAll('.dot');

        if (!cards.length) return;

        const cardWidth = cards[0].offsetWidth + 28;
        const index = Math.round(sliderWrapper.scrollLeft / cardWidth);

        cards.forEach((card, i) => card.classList.toggle('active', i === index));
        dots.forEach((dot, i) => dot.classList.toggle('active', i === index));
    }

    function render(filter = '') {
        cardsContainer.innerHTML = '';
        dotsContainer.innerHTML = '';

        const filtered = terms.filter((term) => includesFilter(term, filter));

        if (!filtered.length) {
            cardsContainer.innerHTML = '<p class="empty">Nenhum termo encontrado.</p>';
            return;
        }

        filtered.forEach((term, index) => {
            const card = document.createElement('article');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-number">${index + 1}</div>
                <h2 class="card-title">${term.title}</h2>
                <span class="card-type">${term.type}</span>
                <p class="card-description">${term.nocao[0]}</p>
                <div class="card-footer">Abrir termo completo →</div>
            `;

            card.addEventListener('click', () => openModal(term));
            cardsContainer.appendChild(card);

            const dot = document.createElement('button');
            dot.type = 'button';
            dot.className = 'dot';
            dot.addEventListener('click', () => {
                const scrollPos = index * (card.offsetWidth + 28);
                sliderWrapper.scrollTo({ left: scrollPos, behavior: 'smooth' });
            });
            dotsContainer.appendChild(dot);
        });

        sliderWrapper.scrollLeft = 0;
        updateActiveState();
    }

    searchInput.addEventListener('input', (event) => {
        render(event.target.value);
    });

    sliderWrapper.addEventListener('scroll', updateActiveState);
    closeBtn.addEventListener('click', closeModal);
    window.addEventListener('click', (event) => {
        if (event.target === modalOverlay) {
            closeModal();
        }
    });

    render();
</script>
</body>
</html>
